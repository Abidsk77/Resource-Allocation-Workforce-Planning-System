version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - FLASK_APP=app
      - SECRET_KEY=your-secret-key-change-this
      - DATABASE_URL=sqlite:///data/resource_allocation.db
    volumes:
      - ./data:/app/data
      - ./app:/app/app
    restart: unless-stopped
    container_name: itpm-app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf.example:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    restart: unless-stopped
    container_name: itpm-nginx
    networks:
      - itpm-network

networks:
  itpm-network:
    driver: bridge
